# Map WebSocket upgrade header — ให้ทำงานได้ทั้ง WebSocket และ HTTP polling
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache MRP static assets only
    location ~* ^/mrp/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────
    # Production API: WebSocket socket.io
    # matches: /api/socket.io/?EIO=4&transport=websocket
    # ^~ — ห้าม regex *.png ด้านบนแย่ง /api/... ไป try_files
    # ─────────────────────────────────────────────
    location ^~ /api/socket.io/ {
        proxy_pass http://host.docker.internal:2530/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Production API: REST
    location ^~ /api/ {
        proxy_pass http://host.docker.internal:2530/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─────────────────────────────────────────────
    # Staging API: WebSocket socket.io
    # ─────────────────────────────────────────────
    location ^~ /api-staging/socket.io/ {
        proxy_pass http://host.docker.internal:2531/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Staging API: REST (/api-staging/ → /api/)
    location ^~ /api-staging/ {
        rewrite ^/api-staging/(.*) /api/$1 break;
        proxy_pass http://host.docker.internal:2531;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # PWA: Service Worker — no cache, must always be fresh
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    location ~* ^/workbox-.+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # MRP SPA mounted under /mrp
    location = /mrp {
        return 301 /mrp/;
    }

    location /mrp/ {
        try_files $uri $uri/ /mrp/index.html;
    }

    # Kanban SPA mounted under /kanban
    location = /kanban {
        return 301 /kanban/;
    }

    location /kanban/ {
        auth_basic "Restricted Kanban";
        auth_basic_user_file /etc/nginx/.kanban_htpasswd;
        proxy_pass http://host.docker.internal:5180/kanban/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root homepage app is served by the dedicated homepage container
    location = / {
        proxy_pass http://host.docker.internal:5178/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forward other non-MRP root paths and assets to the homepage container
    location / {
        proxy_pass http://host.docker.internal:5178;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
