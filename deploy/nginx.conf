server {
    listen 80;
    server_name app.ytrc.co.th;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.ytrc.co.th;

    # SSL (managed by certbot or existing certs)
    ssl_certificate     /etc/letsencrypt/live/app.ytrc.co.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.ytrc.co.th/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/ytrc-app;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # ── PWA: Service Worker — never cache ────────────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── PWA: Workbox runtime chunks ───────────────────────────────────────────
    location ~* ^/workbox-.+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── PWA: registerSW ───────────────────────────────────────────────────────
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── PWA: Web App Manifest ─────────────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "no-cache";
    }

    # ── Static assets (hashed filenames → cache forever) ─────────────────────
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Electron auto-update files ────────────────────────────────────────────
    location /updates/ {
        alias /var/www/ytrc-updates/;
        autoindex off;
        add_header Cache-Control "no-cache";
    }

    # ── API proxy → FastAPI production (port 2530) ────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:2530/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
