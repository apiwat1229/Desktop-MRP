services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desktop-mrp-web
    restart: unless-stopped
    ports:
      - "5174:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
