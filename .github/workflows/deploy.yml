name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Deploy Web (PWA via Docker)
  deploy-web:
    name: Deploy Web (PWA)
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Make deploy script executable
        run: chmod +x deploy.sh

      - name: Run Deployment
        run: ./deploy.sh